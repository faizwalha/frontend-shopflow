<div class="bg-white rounded-2xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] hover:shadow-[0_8px_30px_rgb(0,0,0,0.12)] transition-shadow duration-300 overflow-hidden flex flex-col h-full border border-gray-50">
  <div class="relative group aspect-[4/3] bg-gray-50 overflow-hidden shrink-0">
    <!-- Object fit cover to make image responsive -->
    <img [src]="product.imageUrl || 'https://via.placeholder.com/300'" [alt]="product.name" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 ease-out">
    <div class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
      <button class="bg-white/90 backdrop-blur-sm p-2 rounded-full text-gray-500 hover:text-red-500 transition-colors shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
        </svg>
      </button>
    </div>
  </div>
  <div class="p-5 flex flex-col flex-grow bg-white">
    <p class="text-[13px] text-gray-400 mb-1 font-medium tracking-wide uppercase">{{product.category}}</p>
    <a [routerLink]="['/products', product.id]" class="text-[17px] font-bold text-gray-900 hover:text-indigo-600 transition-colors line-clamp-1 mb-1.5 leading-snug">{{product.name}}</a>
    
    <div class="flex items-center gap-2 mb-4 mt-auto">
      <app-rating-stars [rating]="product.rating"></app-rating-stars>
      <span class="text-[13px] font-medium text-gray-500">({{product.reviewsCount}})</span>
    </div>
    
    <div class="flex items-center justify-between mt-auto">
      <span class="text-[22px] font-bold text-gray-900 tracking-tight">${{product.price.toFixed(2)}}</span>
      <button class="bg-black text-white px-5 py-2.5 rounded-full text-sm font-semibold hover:bg-gray-800 transition-all focus:ring-4 focus:ring-gray-200 active:scale-95 shadow-md hover:shadow-lg">
        Add
      </button>
    </div>
  </div>
</div>

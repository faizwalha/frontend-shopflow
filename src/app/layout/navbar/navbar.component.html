<nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-20 items-center">
      <!-- Logo -->
      <div class="flex-shrink-0 flex items-center">
        <a routerLink="/" class="text-3xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">
          ShopFlow
        </a>
      </div>

      <!-- Main Navigation -->
      <div class="hidden sm:ml-8 sm:flex sm:space-x-8 items-center h-full">
        <a routerLink="/" routerLinkActive="border-indigo-500 text-gray-900" [routerLinkActiveOptions]="{exact: true}" class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-semibold text-gray-500 hover:text-gray-900 transition-colors h-full">Home</a>
        <a routerLink="/products" routerLinkActive="border-indigo-500 text-gray-900" class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-semibold text-gray-500 hover:text-gray-900 transition-colors h-full">Catalog</a>
      </div>

      <div class="flex-grow"></div>

      <!-- Right Navigation -->
      <div class="flex items-center space-x-6">
        <!-- Search icon -->
        <button class="text-gray-400 hover:text-gray-600 transition-colors">
           <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
           </svg>
        </button>

        <!-- Cart -->
        <a routerLink="/cart" class="relative text-gray-400 hover:text-gray-600 transition-colors p-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
          <span class="absolute top-0 right-0 -mt-1 -mr-1 px-1.5 py-0.5 bg-indigo-600 text-white text-[10px] font-bold rounded-full border-2 border-white shadow-sm">{{cartItemsCount}}</span>
        </a>

        <!-- Auth / Profile -->
        <ng-container *ngIf="currentUser$ | async as user; else loginButton">
          <!-- Profile Dropdown mock -->
          <div class="relative group cursor-pointer">
            <div class="flex items-center gap-2 border border-gray-100 rounded-full py-1 pl-1 pr-3 hover:shadow-md transition-shadow bg-white">
              <div class="h-8 w-8 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 text-white flex items-center justify-center font-bold text-sm shadow-inner">
                {{ user.role.charAt(0) }}
              </div>
              <span class="text-sm font-semibold text-gray-700 capitalize">{{ user.role.toLowerCase() }}</span>
            </div>
            
            <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 transform origin-top-right border border-gray-50 z-50">
              <a routerLink="/profile" class="block px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 font-medium">Profile</a>
              <a *ngIf="user.role === 'ADMIN' || user.role === 'SELLER'" routerLink="/dashboard" class="block px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 font-medium">Dashboard</a>
              <button (click)="logout()" class="block w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 font-medium">Sign out</button>
            </div>
          </div>
        </ng-container>

        <ng-template #loginButton>
          <a routerLink="/login" class="inline-flex items-center justify-center px-5 py-2.5 border border-transparent text-sm font-bold rounded-full text-white bg-black hover:bg-gray-800 transition-all shadow-md hover:shadow-lg focus:ring-4 focus:ring-gray-200">
            Sign In
          </a>
        </ng-template>
      </div>
    </div>
  </div>
</nav>

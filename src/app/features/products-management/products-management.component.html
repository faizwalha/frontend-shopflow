<div class="max-w-7xl mx-auto px-4 py-12">
  <div class="flex justify-between items-end mb-10">
    <div>
      <h1 class="text-4xl font-black text-gray-900 tracking-tight">Product Inventory</h1>
      <p class="text-lg text-gray-500 mt-2">Manage your products, prices, and stock levels.</p>
    </div>
    <button *ngIf="!showForm" (click)="openAddForm()" 
            class="bg-black text-white px-8 py-4 rounded-2xl font-bold hover:bg-gray-800 transition-all shadow-lg flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
      </svg>
      Add New Product
    </button>
  </div>

  <!-- Product Form -->
  <div *ngIf="showForm" class="bg-white rounded-3xl border border-gray-100 shadow-2xl p-10 mb-12 animate-in fade-in slide-in-from-top-4 duration-300">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-3xl font-black text-gray-900">{{ selectedProduct ? 'Edit Product' : 'Create Product' }}</h2>
      <button (click)="cancel()" class="text-gray-400 hover:text-gray-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form [formGroup]="productForm" (ngSubmit)="saveProduct()" class="grid md:grid-cols-2 gap-8">
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Product Name</label>
          <input type="text" formControlName="name" class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Description</label>
          <textarea formControlName="description" rows="5" class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all"></textarea>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Images (URLs, comma-separated)</label>
          <input type="text" formControlName="images" class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all" placeholder="http://image1.jpg, http://image2.jpg">
        </div>
      </div>

      <div class="space-y-6">
        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Base Price ($)</label>
            <input type="number" formControlName="price" class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Promo Price ($)</label>
            <input type="number" formControlName="promoPrice" class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Initial Stock</label>
            <input type="number" formControlName="stock" class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Category</label>
            <select formControlName="categoryId" class="w-full px-6 py-4 rounded-2xl border border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all appearance-none bg-white">
              <option [ngValue]="null">Select Category</option>
              <option *ngFor="let cat of categories" [ngValue]="cat.id">{{cat.name}}</option>
            </select>
          </div>
        </div>
        
        <div class="pt-6">
          <button type="submit" [disabled]="productForm.invalid || submitting" 
                  class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl hover:bg-indigo-700 disabled:opacity-50 transition-all shadow-xl shadow-indigo-200">
            {{ submitting ? 'Saving...' : (selectedProduct ? 'Update Product' : 'Create Product') }}
          </button>
        </div>
      </div>
    </form>
  </div>

  <!-- Product List -->
  <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-gray-50 border-b border-gray-100">
          <tr>
            <th class="px-8 py-5 text-sm font-bold text-gray-400 uppercase tracking-wider">Product</th>
            <th class="px-8 py-5 text-sm font-bold text-gray-400 uppercase tracking-wider">Category</th>
            <th class="px-8 py-5 text-sm font-bold text-gray-400 uppercase tracking-wider">Price</th>
            <th class="px-8 py-5 text-sm font-bold text-gray-400 uppercase tracking-wider">Stock</th>
            <th class="px-8 py-5 text-sm font-bold text-gray-400 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          <tr *ngFor="let product of products" class="hover:bg-gray-50/50 transition-colors">
            <td class="px-8 py-6">
              <div class="flex items-center gap-4">
                <img [src]="product.images[0] || 'https://via.placeholder.com/64'" class="h-16 w-16 rounded-2xl object-cover bg-gray-100">
                <span class="font-bold text-gray-900">{{product.name}}</span>
              </div>
            </td>
            <td class="px-8 py-6">
              <span class="px-4 py-1.5 rounded-full bg-indigo-50 text-indigo-600 text-xs font-bold">{{product.categories[0] || 'None'}}</span>
            </td>
            <td class="px-8 py-6">
              <span class="font-bold text-gray-900">${{product.displayPrice}}</span>
              <span *ngIf="product.promoPrice" class="ml-2 text-xs line-through text-gray-400">${{product.price}}</span>
            </td>
            <td class="px-8 py-6">
              <span [class.text-red-500]="product.stock < 5" class="font-bold text-gray-900">{{product.stock}} units</span>
            </td>
            <td class="px-8 py-6">
              <div class="flex gap-2">
                <button (click)="startEdit(product)" class="p-3 rounded-xl bg-gray-100 text-gray-600 hover:bg-indigo-600 hover:text-white transition-all">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                  </svg>
                </button>
                <button (click)="deleteProduct(product.id)" class="p-3 rounded-xl bg-gray-100 text-gray-600 hover:bg-red-600 hover:text-white transition-all">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

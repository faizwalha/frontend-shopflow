<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <div class="flex flex-col md:flex-row gap-8">
    
    <!-- Sidebar Filters -->
    <aside class="w-full md:w-64 shrink-0">
      <div class="sticky top-28 space-y-8">
        <div>
          <h3 class="font-bold text-lg text-gray-900 mb-4">Categories</h3>
          <p *ngIf="loadingCategories" class="text-sm text-gray-500 mb-3">Loading categories...</p>
          <p *ngIf="categoryError && !loadingCategories" class="text-sm text-amber-600 mb-3">{{ categoryError }}</p>
          <ul class="space-y-3">
            <li *ngFor="let category of categories">
              <button 
                (click)="filterByCategory(category)"
                [class.font-bold]="selectedCategory === category"
                [class.text-indigo-600]="selectedCategory === category"
                [class.text-gray-600]="selectedCategory !== category"
                class="hover:text-indigo-500 transition-colors text-left w-full flex items-center justify-between">
                <span>{{category}}</span>
                <span *ngIf="selectedCategory === category" class="h-1.5 w-1.5 bg-indigo-600 rounded-full"></span>
              </button>
            </li>
          </ul>
        </div>
        
        <div>
          <h3 class="font-bold text-lg text-gray-900 mb-4">Price Range</h3>
          <div class="space-y-4">
             <input type="range" class="w-full accent-indigo-600" min="0" max="1000">
             <div class="flex justify-between items-center text-sm font-medium text-gray-500">
                <span>$0</span>
                <span>$1000+</span>
             </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-grow">
      
      <!-- Top Bar -->
      <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
        <div>
          <h1 class="text-3xl font-black text-gray-900">Shop All</h1>
          <p class="text-gray-500 font-medium mt-1">Showing {{filteredProducts.length}} results</p>
        </div>
        
        <div class="flex items-center gap-4 w-full sm:w-auto">
          <!-- Search -->
          <div class="relative w-full sm:w-64">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
              </svg>
            </div>
            <input type="text" placeholder="Search products..." (input)="onSearch($event)" class="pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-full w-full focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-medium text-sm transition-shadow shadow-sm">
          </div>
          
          <!-- Sort -->
          <select class="bg-white border border-gray-200 rounded-full py-2 pl-4 pr-10 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer shadow-sm" (change)="changePage(0)">
            <option>Latest</option>
            <option>Price: Low to High</option>
            <option>Price: High to Low</option>
            <option>Highest Rated</option>
          </select>
        </div>
      </div>
      
      <!-- Product Grid -->
      <div *ngIf="loadingProducts" class="text-center py-24 bg-white rounded-3xl border border-gray-100 shadow-sm text-gray-500 font-medium">
        Loading products...
      </div>

      <div *ngIf="!loadingProducts && filteredProducts.length > 0; else noResults" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
         <app-product-card *ngFor="let product of filteredProducts" [product]="product"></app-product-card>
      </div>
      
      <ng-template #noResults>
        <div class="text-center py-24 bg-white rounded-3xl border border-gray-100 shadow-sm">
          <svg class="mx-auto h-12 w-12 text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <h3 class="text-xl font-bold text-gray-900 mb-1">No products found</h3>
          <p class="text-gray-500 font-medium">Try adjusting your search or filters.</p>
          <button (click)="filterByCategory('All'); searchQuery=''" class="mt-6 px-6 py-2 bg-black text-white rounded-full font-semibold hover:bg-gray-800 transition-colors">Clear all filters</button>
        </div>
      </ng-template>
      
      <!-- Pagination -->
      <div class="mt-12 flex justify-center" *ngIf="!loadingProducts && totalPages > 1">
        <nav class="relative z-0 inline-flex shadow-sm rounded-md bg-white border border-gray-200 p-1">
          <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 0" class="relative inline-flex items-center px-2 py-2 rounded-l-md bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors disabled:opacity-40">
            Previous
          </button>
          <button *ngFor="let page of pageNumbers; let index = index" (click)="changePage(index)" [class.bg-indigo-50]="currentPage === index" [class.text-indigo-600]="currentPage === index" [class.bg-white]="currentPage !== index" [class.text-gray-700]="currentPage !== index" class="relative inline-flex items-center px-4 py-2 text-sm font-semibold hover:bg-gray-50 rounded-md mx-1 transition-colors">
            {{ page + 1 }}
          </button>
          <button (click)="changePage(currentPage + 1)" [disabled]="currentPage >= totalPages - 1" class="relative inline-flex items-center px-2 py-2 rounded-r-md bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors disabled:opacity-40">
             Next
          </button>
        </nav>
      </div>

    </div>
  </div>
</div>

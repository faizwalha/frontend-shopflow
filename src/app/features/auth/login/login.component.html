<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 bg-[url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2029&auto=format&fit=crop')] bg-cover bg-center">
  <!-- Overlay -->
  <div class="absolute inset-0 bg-white/60 backdrop-blur-lg"></div>
  
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-gray-100 relative z-10 mx-auto">
    <div>
        <h2 class="mt-2 text-center text-3xl font-black text-gray-900 tracking-tight">
        Welcome back
      </h2>
      <p class="mt-2 text-center text-sm text-gray-500 font-medium">
        Don't have an account? 
        <a routerLink="/register" class="font-bold text-indigo-600 hover:text-indigo-500 transition-colors">Sign up for free</a>
      </p>
    </div>
    
    <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm font-medium">
      {{ errorMessage }}
    </div>

    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <div>
          <label for="email-address" class="block text-sm font-semibold text-gray-700 mb-1">Email address</label>
          <input id="email-address" formControlName="email" type="email" autocomplete="email" required class="appearance-none relative block w-full px-4 py-3 placeholder-gray-400 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm font-medium transition-shadow shadow-sm" placeholder="you@example.com">
        </div>
        <div>
          <div class="flex items-center justify-between mb-1">
            <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
            <a href="#" class="text-sm font-bold text-indigo-600 hover:text-indigo-500 transition-colors">Forgot password?</a>
          </div>
          <input id="password" formControlName="password" type="password" autocomplete="current-password" required class="appearance-none relative block w-full px-4 py-3 placeholder-gray-400 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm font-medium transition-shadow shadow-sm" placeholder="••••••••">
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="loginForm.invalid || isLoading" class="group relative w-full flex justify-center items-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-black hover:bg-gray-800 transition-all focus:outline-none focus:ring-4 focus:ring-gray-200 disabled:opacity-50 disabled:cursor-not-allowed shadow-md">
            <svg *ngIf="isLoading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          {{ isLoading ? 'Signing in...' : 'Sign in' }}
        </button>
      </div>
    </form>
  </div>
</div>

<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 bg-[url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center">
	<div class="absolute inset-0 bg-white/60 backdrop-blur-lg"></div>

	<div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-gray-100 relative z-10 mx-auto">
		<div>
			<h2 class="mt-2 text-center text-3xl font-black text-gray-900 tracking-tight">
				Create your account
			</h2>
			<p class="mt-2 text-center text-sm text-gray-500 font-medium">
				Already have an account?
				<a routerLink="/login" class="font-bold text-indigo-600 hover:text-indigo-500 transition-colors">Sign in</a>
			</p>
		</div>

		<div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm font-medium">
			{{ errorMessage }}
		</div>

		<form class="mt-8 space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
			<div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
				<div>
					<label class="block text-sm font-semibold text-gray-700 mb-1" for="firstName">First name</label>
					<input id="firstName" formControlName="firstName" type="text" required class="appearance-none relative block w-full px-4 py-3 placeholder-gray-400 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm font-medium transition-shadow shadow-sm" placeholder="John">
				</div>
				<div>
					<label class="block text-sm font-semibold text-gray-700 mb-1" for="lastName">Last name</label>
					<input id="lastName" formControlName="lastName" type="text" required class="appearance-none relative block w-full px-4 py-3 placeholder-gray-400 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm font-medium transition-shadow shadow-sm" placeholder="Doe">
				</div>
			</div>

			<div class="space-y-4">
				<div>
					<label class="block text-sm font-semibold text-gray-700 mb-1" for="email">Email address</label>
					<input id="email" formControlName="email" type="email" autocomplete="email" required class="appearance-none relative block w-full px-4 py-3 placeholder-gray-400 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm font-medium transition-shadow shadow-sm" placeholder="you@example.com">
				</div>

				<div>
					<label class="block text-sm font-semibold text-gray-700 mb-1" for="password">Password</label>
					<input id="password" formControlName="password" type="password" autocomplete="new-password" required class="appearance-none relative block w-full px-4 py-3 placeholder-gray-400 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm font-medium transition-shadow shadow-sm" placeholder="••••••••">
				</div>

				<div>
					<label class="block text-sm font-semibold text-gray-700 mb-1" for="role">Account type</label>
					<select id="role" formControlName="role" class="appearance-none relative block w-full px-4 py-3 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm font-medium transition-shadow shadow-sm">
						<option value="CUSTOMER">Customer</option>
						<option value="SELLER">Seller</option>
					</select>
				</div>
			</div>

			<button type="submit" [disabled]="registerForm.invalid || isLoading" class="group relative w-full flex justify-center items-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-black hover:bg-gray-800 transition-all focus:outline-none focus:ring-4 focus:ring-gray-200 disabled:opacity-50 disabled:cursor-not-allowed shadow-md">
				<svg *ngIf="isLoading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
					<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
					<path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
				</svg>
				{{ isLoading ? 'Creating account...' : 'Create account' }}
			</button>
		</form>
	</div>
</div>
